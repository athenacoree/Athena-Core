# LibreChat Configuration for Athena Core
version: 1.1.5

cache: true

endpoints:
  custom:
    - name: 'OpenRouter'
      apiKey: '${OPENROUTER_KEY}'
      baseURL: 'https://openrouter.ai/api/v1'
      headers:
        x-librechat-body-parentmessageid: '{{LIBRECHAT_BODY_PARENTMESSAGEID}}'
      models:
        default: ['google/gemini-2.0-flash-lite', 'openrouter/auto']
        fetch: true
      titleConvo: true
      titleModel: 'google/gemini-2.0-flash-lite'
      dropParams: ['stop']
      modelDisplayLabel: 'OpenRouter'

mcpServers:
  keyid:
    url: "https://keyid.ai/mcp"
    type: "sse"
    startup: false
